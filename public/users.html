<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — Revora</title>
  <link rel="stylesheet" href="/css/app.css">
</head>

<body>
  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-title">Users</div>
        <div class="topbar-actions"><button class="btn btn-primary" onclick="openModal()">+ New User</button>
          <div style="position:relative;margin-left:8px"><button class="topbar-icon-btn" id="notif-bell-btn">🔔<span
                class="notif-badge" id="notif-count" style="display:none">0</span></button>
            <div class="notif-dropdown" id="notif-dropdown">
              <div class="notif-dropdown-header">
                <h3>Notifications</h3><button class="btn btn-ghost btn-xs" onclick="NotifManager.markAllRead()">Mark all
                  read</button>
              </div>
              <div class="notif-dropdown-body" id="notif-dropdown-body"></div>
            </div>
          </div>
        </div>
      </header>
      <main class="page-content">
        <div class="page-header">
          <h1 style="cursor: pointer;" onclick="window.location.reload()">User Management</h1>
          <p class="text-muted">Manage staff, admins, and portal users</p>
        </div>
        <div class="filter-bar">
          <select id="filter-role">
            <option value="">All Roles</option>
            <option value="ADMIN">Admins</option>
            <option value="INTERNAL">Internal Staff</option>
            <option value="PORTAL">Portal Users</option>
          </select>
        </div>
        <div class="card card-with-spark">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Company</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr>
                  <td colspan="6" class="table-empty">
                    <div class="loading-spinner" style="margin:0 auto"></div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-overlay" id="form-modal">
    <div class="modal form-with-spark">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">New User</div><button class="modal-close"
          onclick="Modal.hide('form-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="data-form">
          <input type="hidden" id="item-id">
          <div class="form-group"><label class="form-label">Full Name <span class="required">*</span></label><input
              type="text" class="form-input" id="f-name" required></div>
          <div class="form-group"><label class="form-label">Email <span class="required">*</span></label><input
              type="email" class="form-input" id="f-email" required></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-input"
                id="f-phone"></div>
            <div class="form-group"><label class="form-label">Company</label><input type="text" class="form-input"
                id="f-company"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Role <span class="required">*</span></label><select
                class="form-select" id="f-role">
                <option value="PORTAL">Portal User</option>
                <option value="INTERNAL">Internal Staff</option>
                <option value="ADMIN">Admin</option>
              </select></div>
            <div class="form-group"><label class="form-label" id="lbl-pwd">Initial Password <span
                  class="required">*</span></label><input type="text" class="form-input" id="f-password" required></div>
          </div>
        </form>
      </div>
      <div class="modal-footer"><button class="btn btn-outline"
          onclick="Modal.hide('form-modal')">Cancel</button><button class="btn btn-primary" onclick="submitForm()">Save
          User</button></div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth(['ADMIN'])) throw new Error('Unauthorized');

    async function loadData() {
      try {
        const role = document.getElementById('filter-role').value;
        const res = await API.get(`/users${role ? `?role=${role}` : ''}`);
        const tbody = document.getElementById('table-body');
        if (!res.data.length) return tbody.innerHTML = `<tr><td colspan="6" class="table-empty"><p>No users found</p></td></tr>`;

        tbody.innerHTML = res.data.map(item => `
            <tr>
                <td><div class="fw-semibold">${item.name}</div></td>
                <td>${item.email}</td>
                <td>${item.companyName || '—'}</td>
                <td><span class="badge ${item.role === 'ADMIN' ? 'badge-primary' : item.role === 'INTERNAL' ? 'badge-info' : 'badge-draft'}">${item.role}</span></td>
                <td><span class="badge badge-active">Active</span></td>
                <td><button class="btn btn-ghost btn-sm" onclick='editItem(${JSON.stringify(item).replace(/'/g, "&apos;")})'>Edit</button></td>
            </tr>
        `).join('');
      } catch (err) { Toast.error(err.message); }
    }

    function openModal() {
      document.getElementById('data-form').reset();
      document.getElementById('item-id').value = '';
      document.getElementById('f-password').required = true;
      document.getElementById('f-password').parentElement.style.display = 'block';
      document.getElementById('modal-title').textContent = 'New User';
      Modal.show('form-modal');
    }

    function editItem(item) {
      document.getElementById('item-id').value = item.id;
      document.getElementById('f-name').value = item.name;
      document.getElementById('f-email').value = item.email;
      document.getElementById('f-phone').value = item.phone || '';
      document.getElementById('f-company').value = item.companyName || '';
      document.getElementById('f-role').value = item.role;
      document.getElementById('f-password').required = false;
      document.getElementById('f-password').parentElement.style.display = 'none';
      document.getElementById('modal-title').textContent = 'Edit User';
      Modal.show('form-modal');
    }

    async function submitForm() {
      try {
        const id = document.getElementById('item-id').value;
        const payload = {
          name: document.getElementById('f-name').value,
          email: document.getElementById('f-email').value,
          phone: document.getElementById('f-phone').value,
          companyName: document.getElementById('f-company').value,
          role: document.getElementById('f-role').value
        };
        if (!id) payload.password = document.getElementById('f-password').value;

        if (id) await API.put(`/users/${id}`, payload);
        else await API.post('/users', payload);
        Toast.success('Saved!'); Modal.hide('form-modal'); loadData();
      } catch (e) { Toast.error(e.message); }
    }

    UI.upgradeSelect('filter-role', () => loadData());
    loadData();
  </script>
</body>

</html>
