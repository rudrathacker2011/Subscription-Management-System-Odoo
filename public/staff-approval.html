<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Approval — Revora</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">Staff Approval</div>
      <div class="topbar-actions"><div style="position:relative"><button class="topbar-icon-btn" id="notif-bell-btn">🔔<span class="notif-badge" id="notif-count" style="display:none">0</span></button><div class="notif-dropdown" id="notif-dropdown"><div class="notif-dropdown-header"><h3>Notifications</h3><button class="btn btn-ghost btn-xs" onclick="NotifManager.markAllRead()">Mark all read</button></div><div class="notif-dropdown-body" id="notif-dropdown-body"></div></div></div></div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <h1>Staff Final Approval</h1>
        <p class="text-muted">These requests have been approved by admin and need your final verification</p>
      </div>
      <div id="pending-list"><div class="loading-center"><div class="loading-spinner"></div></div></div>
    </main>
  </div>
</div>

<div class="modal-overlay" id="reject-modal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header"><div class="modal-title">Reject Request</div><button class="modal-close" onclick="Modal.hide('reject-modal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Rejection Reason <span class="required">*</span></label><textarea class="form-textarea" id="reject-reason" placeholder="Provide a reason..."></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="Modal.hide('reject-modal')">Cancel</button><button class="btn btn-danger" onclick="submitReject()">Reject</button></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
if (!requireAuth(['ADMIN', 'INTERNAL'])) throw new Error('Unauthorized');

let rejectId = null;

async function loadPending() {
  try {
    const res = await API.get('/subscriptions/pending-staff');
    const list = document.getElementById('pending-list');
    if (!res.data || res.data.length === 0) {
      list.innerHTML = '<div class="table-empty"><div class="empty-icon">✅</div><p>No pending staff approvals</p></div>';
      return;
    }
    list.innerHTML = res.data.map(s => {
      const items = s.lineItems.map(li => `<span class="tag">${li.product?.name || 'Product'} × ${li.quantity}</span>`).join(' ');
      const total = s.lineItems.reduce((sum, li) => sum + li.lineTotal, 0);
      return `
      <div class="approval-card">
        <div class="approval-header">
          <div>
            <div style="font-size:18px;font-weight:700">${s.subscriptionNumber}</div>
            <div style="font-size:13px;color:var(--text-muted)">Admin approved by: <strong>${s.approvedByAdmin?.name || 'Admin'}</strong></div>
          </div>
          ${fmt.badge(s.status)}
        </div>
        <div class="approval-info">
          <div class="approval-info-item"><div class="approval-info-label">Customer</div><div class="approval-info-value">${s.customer.name}</div></div>
          <div class="approval-info-item"><div class="approval-info-label">Company</div><div class="approval-info-value">${s.customer.companyName || '—'}</div></div>
          <div class="approval-info-item"><div class="approval-info-label">Plan</div><div class="approval-info-value">${s.plan?.name || '—'}</div></div>
          <div class="approval-info-item"><div class="approval-info-label">Total</div><div class="approval-info-value text-primary" style="font-family:var(--font-mono)">${fmt.currency(total)}</div></div>
        </div>
        <div style="margin-bottom:16px">${items}</div>
        <div class="approval-actions">
          <button class="btn btn-success" onclick="approveStaff('${s.id}')">✅ Approve & Activate</button>
          <button class="btn btn-danger" onclick="openReject('${s.id}')">❌ Reject</button>
        </div>
      </div>`;
    }).join('');
  } catch (err) { Toast.error(err.message); }
}

async function approveStaff(id) {
  try {
    await API.post(`/subscriptions/${id}/staff-approve`);
    Toast.success('Subscription activated! Invoice generated.');
    loadPending();
  } catch (err) { Toast.error(err.message); }
}

function openReject(id) {
  rejectId = id;
  document.getElementById('reject-reason').value = '';
  Modal.show('reject-modal');
}

async function submitReject() {
  const reason = document.getElementById('reject-reason').value.trim();
  if (!reason) return Toast.error('Please provide a reason.');
  try {
    await API.post(`/subscriptions/${rejectId}/staff-reject`, { reason });
    Toast.success('Request rejected.');
    Modal.hide('reject-modal');
    loadPending();
  } catch (err) { Toast.error(err.message); }
}

loadPending();
</script>
</body>
</html>
