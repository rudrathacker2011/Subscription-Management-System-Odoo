<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Odoo Hub</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container" style="max-width: 480px;">
        <h2>Security Reset Hub</h2>
        <form id="reset-form">
            <div class="form-group">
                <label for="newPassword">New Security Password</label>
                <input type="password" id="newPassword" placeholder="••••••••" required>
                
                <!-- 🛡️ PASSWORD STRENGTH SCORECARD -->
                <div class="password-requirements" id="requirements">
                    <div class="requirement" id="req-length"><i class="fa-solid fa-circle-dot"></i> 8+ Characters</div>
                    <div class="requirement" id="req-upper"><i class="fa-solid fa-circle-dot"></i> Uppercase</div>
                    <div class="requirement" id="req-lower"><i class="fa-solid fa-circle-dot"></i> Lowercase</div>
                    <div class="requirement" id="req-number"><i class="fa-solid fa-circle-dot"></i> Number</div>
                    <div class="requirement" id="req-special"><i class="fa-solid fa-circle-dot"></i> Symbol (!@#$%^&*)</div>
                </div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" id="btn-submit">Assign New Password</button>
            <p class="error" id="error-message"></p>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        const passwordInput = document.getElementById('newPassword');
        const confirmInput = document.getElementById('confirmPassword');
        const errorP = document.getElementById('error-message');
        const submitBtn = document.getElementById('btn-submit');

        const requirements = {
            length: document.getElementById('req-length'),
            upper: document.getElementById('req-upper'),
            lower: document.getElementById('req-lower'),
            number: document.getElementById('req-number'),
            special: document.getElementById('req-special'),
        };

        const validate = () => {
            const val = passwordInput.value;
            const checks = {
                length: val.length >= 8,
                upper: /[A-Z]/.test(val),
                lower: /[a-z]/.test(val),
                number: /[0-9]/.test(val),
                special: /[!@#$%^&*]/.test(val),
            };

            for (const key in checks) {
                if (checks[key]) {
                    requirements[key].classList.add('valid');
                    requirements[key].querySelector('i').className = 'fa-solid fa-circle-check';
                } else {
                    requirements[key].classList.remove('valid');
                    requirements[key].querySelector('i').className = 'fa-solid fa-circle-dot';
                }
            }
            return Object.values(checks).every(v => v);
        };

        passwordInput.addEventListener('input', validate);

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!token) {
                errorP.textContent = 'Critical: Reset token missing from URL.';
                return;
            }

            if (!validate()) {
                errorP.textContent = 'Follow the security scorecard first.';
                return;
            }

            if (passwordInput.value !== confirmInput.value) {
                errorP.textContent = 'Confirmation mismatch. Enter identical passwords.';
                return;
            }

            errorP.style.color = 'var(--text-secondary)';
            errorP.textContent = 'Updating system credentials...';
            submitBtn.disabled = true;

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: passwordInput.value })
                });

                const data = await res.json();

                if (res.ok) {
                    errorP.style.color = '#10b981';
                    errorP.textContent = data.message;
                    setTimeout(() => location.assign('/index.html'), 2000);
                } else {
                    errorP.style.color = 'var(--error-red)';
                    errorP.textContent = data.error || 'Interface error.';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                errorP.style.color = 'var(--error-red)';
                errorP.textContent = 'Critical system error.';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
