<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Revora</title>
  <link rel="stylesheet" href="/css/app.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card form-with-spark">
      <div class="auth-logo" style="cursor: pointer;" onclick="window.location.reload()">
        <div class="auth-logo-icon">R</div>
        <h1>Set New Password</h1>
        <p>Enter your new password below</p>
      </div>
      <div class="auth-error" id="error-msg" style="display:none"></div>
      <div id="success-msg"
        style="display:none;background:var(--success-light);border:1px solid #A7F3D0;border-radius:var(--radius);padding:12px 16px;font-size:13px;color:#065F46;margin-bottom:18px;text-align:center">
      </div>
      <form id="reset-form">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:12px"
          id="btn-reset">Reset Password →</button>
      </form>
      <div class="auth-footer" style="margin-top:24px">
        <a href="/login.html">← Back to Sign In</a>
      </div>
    </div>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (!token) {
      document.getElementById('error-msg').textContent = 'Invalid or missing token. Please request a new reset link.';
      document.getElementById('error-msg').style.display = 'flex';
      document.getElementById('reset-form').style.display = 'none';
    }

    document.getElementById('reset-form')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errEl = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');
      const btn = document.getElementById('btn-reset');

      errEl.style.display = 'none';
      successEl.style.display = 'none';

      if (password !== confirmPassword) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'flex';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: password })
        });
        const data = await res.json();
        if (res.ok) {
          successEl.textContent = 'Password reset successful! Redirecting to login...';
          successEl.style.display = 'block';
          document.getElementById('reset-form').style.display = 'none';
          setTimeout(() => { window.location.href = '/login.html'; }, 2000);
        } else {
          throw new Error(data.error || 'Reset failed');
        }
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'flex';
        btn.disabled = false;
        btn.textContent = 'Reset Password →';
      }
    });
  </script>
</body>

</html>
