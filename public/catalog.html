<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Catalog — Revora</title>
  <link rel="stylesheet" href="/css/app.css">
</head>

<body>
  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-title">Catalog</div>
        <div class="topbar-search">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" placeholder="Search products...">
        </div>
        <div class="topbar-actions">
          <div style="position:relative"><button class="topbar-icon-btn" id="notif-bell-btn"
              title="Notifications">🔔<span class="notif-badge" id="notif-count" style="display:none">0</span></button>
            <div class="notif-dropdown" id="notif-dropdown">
              <div class="notif-dropdown-header">
                <h3>Notifications</h3><button class="btn btn-ghost btn-xs" onclick="NotifManager.markAllRead()">Mark all
                  read</button>
              </div>
              <div class="notif-dropdown-body" id="notif-dropdown-body"></div>
            </div>
          </div>
        </div>
      </header>
      <main class="page-content">
        <div class="page-header page-header-row">
          <div>
            <h1 style="cursor: pointer;" onclick="window.location.reload()">Product Catalog</h1>
            <p class="text-muted">Browse available products and request a subscription</p>
          </div>
          <button class="btn btn-primary" onclick="openCartModal()" id="cart-btn" style="display:none">🛒 Cart (<span
              id="cart-count">0</span>)</button>
        </div>

        <div class="filter-bar">
          <div class="filter-search">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            <input type="text" id="catalog-search" placeholder="Search by product name..." oninput="loadCatalog()">
          </div>
          <select class="filter-select" id="catalog-type" onchange="loadCatalog()">
            <option value="">All Types</option>
            <option value="SERVICE">Services</option>
            <option value="GOOD">Goods</option>
          </select>
        </div>

        <div class="catalog-grid" id="catalog-grid">
          <div class="loading-center">
            <div class="loading-spinner"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Cart/Request Modal -->
  <div class="modal-overlay" id="cart-modal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div class="modal-title">🛒 Subscription Request</div>
        <button class="modal-close" onclick="Modal.hide('cart-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Select Plan <span class="required">*</span></label>
          <select class="form-select" id="cart-plan"></select>
        </div>
        <div id="cart-items"></div>
        <div class="mt-2 pt-2" style="border-top:1px dashed var(--border)">
          <div class="form-group" style="max-width: 250px; margin-left: auto;">
            <label class="form-label" style="font-size: 11px; text-transform: uppercase;">Have a Coupon?</label>
            <div class="input-group">
              <input type="text" id="cart-coupon" class="form-input" placeholder="Code..." style="text-transform: uppercase">
              <button class="btn btn-outline btn-sm" onclick="validateCartCoupon()" id="coupon-btn">Apply</button>
            </div>
            <div id="coupon-msg" style="font-size: 11px; margin-top: 4px; display: none;"></div>
          </div>
        </div>
        <div class="totals-box mt-1" style="background:transparent; padding: 0; width: 100%">
          <div class="totals-row" style="margin-bottom:4px"><span>Subtotal</span><span id="summ-sub">$0.00</span></div>
          <div class="totals-row" id="row-discount" style="display:none; color: var(--success); margin-bottom:4px">
            <span>Discount</span><span id="summ-discount">-$0.00</span>
          </div>
          <div class="totals-row" style="margin-bottom:4px"><span>Tax (Estimated)</span><span id="summ-tax">$0.00</span></div>
          <div class="totals-row grand-total" style="font-size: 20px; color: var(--primary); border-top: 1px solid var(--border); padding-top: 8px;">
            <span>Total</span><span id="cart-total">$0.00</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="Modal.hide('cart-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="submitRequest()">Submit Request →</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Unauthorized');

    let products = [], plans = [], cart = [];
    let planSelectUI;
    let activeTaxes = [];
    let currentDiscount = null;

    async function loadCatalog() {
      try {
        const search = document.getElementById('catalog-search').value;
        const type = document.getElementById('catalog-type').value;
        let url = '/catalog?';
        if (search) url += `search=${encodeURIComponent(search)}&`;
        if (type) url += `type=${type}`;

        const [catRes, taxRes] = await Promise.all([
          API.get(url),
          API.get('/taxes')
        ]);
        products = catRes.data.products;
        plans = catRes.data.plans;
        activeTaxes = taxRes.data.filter(t => t.isActive);
        renderProducts();
      } catch (err) {
        Toast.error('Failed to load catalog: ' + err.message);
      }
    }

    function renderProducts() {
      const grid = document.getElementById('catalog-grid');
      if (products.length === 0) {
        grid.innerHTML = '<div class="table-empty"><div class="empty-icon">📦</div><p>No products available</p></div>';
        return;
      }
      grid.innerHTML = products.map(p => `
    <div class="catalog-card">
      <div class="catalog-card-header">
        <div class="catalog-card-icon">${p.productType === 'SERVICE' ? '⚡' : '📦'}</div>
        <div class="catalog-card-name">${p.name}</div>
        <div class="catalog-card-type">${p.productType}</div>
      </div>
      <div class="catalog-card-body">
        <div class="catalog-card-desc">${p.description || 'No description'}</div>
      </div>
      <div class="catalog-card-footer">
        <div class="catalog-card-price">${fmt.currency(p.salesPrice)} <span>/unit</span></div>
        <button class="btn btn-primary btn-sm" onclick="addToCart('${p.id}')">
          ${cart.find(c => c.productId === p.id) ? '✓ Added' : '+ Add'}
        </button>
      </div>
    </div>
  `).join('');
    }

    function addToCart(productId) {
      const existing = cart.find(c => c.productId === productId);
      if (existing) {
        cart = cart.filter(c => c.productId !== productId);
      } else {
        const product = products.find(p => p.id === productId);
        cart.push({ productId, quantity: 1, product });
      }
      updateCartUI();
      renderProducts();
    }

    function updateCartUI() {
      const btn = document.getElementById('cart-btn');
      const count = document.getElementById('cart-count');
      count.textContent = cart.length;
      btn.style.display = cart.length > 0 ? 'inline-flex' : 'none';
    }

    function openCartModal() {
      const planSelect = document.getElementById('cart-plan');
      planSelect.innerHTML = plans.map(p => `<option value="${p.id}">${p.name} — ${fmt.currency(p.price)}/${p.billingPeriod.toLowerCase()}</option>`).join('');

      if (planSelectUI) planSelectUI.refresh();
      renderCartItems();
      Modal.show('cart-modal');
    }

    function renderCartItems() {
      let subtotal = 0;
      document.getElementById('cart-items').innerHTML = cart.map((item, i) => {
        const lineTotal = item.product.salesPrice * item.quantity;
        subtotal += lineTotal;
        return `
    <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1">
        <div style="font-weight:600">${item.product.name}</div>
        <div style="font-size:12px;color:var(--text-muted)">${fmt.currency(item.product.salesPrice)}/unit</div>
      </div>
      <input type="number" class="form-input" style="width:70px" min="1" value="${item.quantity}" onchange="updateCartQty(${i}, this.value)">
      <div style="font-weight:700;width:100px;text-align:right;color:var(--primary)">${fmt.currency(lineTotal)}</div>
      <button class="btn btn-ghost btn-xs" onclick="removeFromCart(${i})">✕</button>
    </div>`;
      }).join('');

      let discountVal = 0;
      if (currentDiscount) {
        discountVal = currentDiscount.discountType === 'PERCENTAGE' 
          ? subtotal * (currentDiscount.value / 100)
          : currentDiscount.value;
        discountVal = Math.min(discountVal, subtotal);
        document.getElementById('row-discount').style.display = 'flex';
        document.getElementById('summ-discount').textContent = `-${fmt.currency(discountVal)}`;
      } else {
        document.getElementById('row-discount').style.display = 'none';
      }

      const taxableAmount = subtotal - discountVal;
      let taxVal = 0;
      activeTaxes.forEach(t => {
        taxVal += taxableAmount * (t.percentage / 100);
      });

      const grandTotal = taxableAmount + taxVal;

      document.getElementById('summ-sub').textContent = fmt.currency(subtotal);
      document.getElementById('summ-tax').textContent = fmt.currency(taxVal);
      document.getElementById('cart-total').textContent = fmt.currency(grandTotal);
    }

    async function validateCartCoupon() {
      const code = document.getElementById('cart-coupon').value.trim();
      const msg = document.getElementById('coupon-msg');
      const btn = document.getElementById('coupon-btn');
      
      if (!code) {
        currentDiscount = null;
        msg.style.display = 'none';
        renderCartItems();
        return;
      }

      let subtotal = 0;
      cart.forEach(item => subtotal += item.product.salesPrice * item.quantity);

      try {
        btn.disabled = true;
        btn.textContent = '...';
        const res = await API.post('/discounts/validate', { code, amount: subtotal });
        currentDiscount = res.discount;
        msg.textContent = `✅ ${res.discount.name}`;
        msg.className = 'text-success';
        msg.style.display = 'block';
        renderCartItems();
      } catch (err) {
        currentDiscount = null;
        msg.textContent = `❌ ${err.message}`;
        msg.className = 'text-danger';
        msg.style.display = 'block';
        renderCartItems();
      } finally {
        btn.disabled = false;
        btn.textContent = 'Apply';
      }
    }

    function updateCartQty(index, qty) {
      cart[index].quantity = Math.max(1, parseInt(qty) || 1);
      renderCartItems();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      renderCartItems();
      updateCartUI();
      renderProducts();
      if (cart.length === 0) Modal.hide('cart-modal');
    }

    async function submitRequest() {
      const btn = document.querySelector('#cart-modal .btn-primary');
      const orgHtml = btn.innerHTML;

      try {
        const planId = document.getElementById('cart-plan').value;
        if (!planId) return Toast.error('Please select a plan');
        if (cart.length === 0) return Toast.error('Cart is empty');

        // Start Loading
        btn.disabled = true;
        btn.innerHTML = '<div class="loading-spinner-xs"></div> Submitting...';

        const lineItems = cart.map(c => ({
          productId: c.productId,
          quantity: c.quantity
        }));

        const res = await API.post('/subscriptions/request', { 
          planId, 
          lineItems,
          couponCode: document.getElementById('cart-coupon').value.trim().toUpperCase() || null
        });
        Toast.success('Subscription activated! Redirecting to payment...');
        Modal.hide('cart-modal');
        cart = [];
        updateCartUI();
        renderProducts();

        setTimeout(() => {
          if (res.invoiceId) {
            window.location.href = `/invoices-detail.html?id=${res.invoiceId}`;
          } else {
            window.location.href = '/subscriptions.html';
          }
        }, 1500);
      } catch (err) {
        Toast.error(err.message);
        // Reset button on error
        btn.disabled = false;
        btn.innerHTML = orgHtml;
      }
    }

    UI.upgradeSelect('catalog-type', () => loadCatalog());
    planSelectUI = UI.upgradeSelect('cart-plan');
    loadCatalog();
  </script>
</body>

</html>
