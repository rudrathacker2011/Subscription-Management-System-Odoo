<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — SubsManager</title>
<meta name="description" content="Sign in to SubsManager — the complete subscription management platform.">
<link rel="stylesheet" href="/css/app.css">
<style>
.login-bg-text { position: absolute; bottom: 40px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.1); font-size: 80px; font-weight: 900; letter-spacing: -2px; user-select: none; pointer-events: none; }
.demo-creds { background: #0F172A; border: 1px solid #1E293B; border-radius: 10px; padding: 14px; margin-top: 16px; }
.demo-creds p { font-size: 11.5px; color: #64748B; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.demo-cred-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #1E293B; }
.demo-cred-row:last-child { border: none; }
.demo-cred-label { font-size: 12px; color: #94A3B8; }
.demo-cred-val { font-size: 11.5px; font-family: 'JetBrains Mono', monospace; color: #3B82F6; cursor: pointer; }
.demo-cred-val:hover { color: #60A5FA; }
</style>
</head>
<body>
<div class="auth-page" style="position:relative;overflow:hidden">
<span class="login-bg-text">SUBS</span>

<div class="auth-card" style="position:relative;z-index:1">
  <div class="auth-logo">
    <div class="auth-logo-icon">💼</div>
    <h1>SubsManager</h1>
    <p>Sign in to your account</p>
  </div>

  <div id="auth-error" class="auth-error" style="display:none">
    <span>⚠️</span><span id="auth-error-msg"></span>
  </div>

  <form id="login-form">
    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input id="email" type="email" class="form-input" placeholder="admin@test.com" autocomplete="email" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div style="position:relative">
        <input id="password" type="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required style="padding-right:42px">
        <button type="button" id="toggle-pw" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;color:var(--text-muted);font-size:18px;padding:4px">👁</button>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <a href="/forgot-password.html" style="font-size:13px;color:var(--primary)">Forgot password?</a>
    </div>
    <button type="submit" id="login-btn" class="btn btn-primary w-full" style="width:100%;justify-content:center;padding:11px">
      Sign In
    </button>
  </form>

  <div class="auth-footer">
    Don't have an account? <a href="/register.html">Sign up</a>
  </div>

  <div class="demo-creds">
    <p>🔑 Demo Credentials (click to fill)</p>
    <div class="demo-cred-row">
      <span class="demo-cred-label">Admin</span>
      <span class="demo-cred-val" onclick="fillCreds('admin@test.com','Admin@123')">admin@test.com / Admin@123</span>
    </div>
    <div class="demo-cred-row">
      <span class="demo-cred-label">Staff</span>
      <span class="demo-cred-val" onclick="fillCreds('staff@test.com','Staff@123')">staff@test.com / Staff@123</span>
    </div>
    <div class="demo-cred-row">
      <span class="demo-cred-label">Customer</span>
      <span class="demo-cred-val" onclick="fillCreds('customer@test.com','Customer@123')">customer@test.com / Customer@123</span>
    </div>
  </div>
</div>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
// Redirect if already logged in
if (Auth.isLoggedIn()) location.href = '/dashboard.html';

function fillCreds(email, pw) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = pw;
}

document.getElementById('toggle-pw').addEventListener('click', function() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
  this.textContent = pw.type === 'password' ? '👁' : '🙈';
});

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('auth-error');
  const errMsg = document.getElementById('auth-error-msg');
  errEl.style.display = 'none';
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  try {
    const data = await API.post('/auth/login', {
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value
    });
    Auth.setSession(data.accessToken, data.user);
    Toast.success(`Welcome back, ${data.user.name}!`);
    setTimeout(() => location.href = '/dashboard.html', 400);
  } catch (err) {
    errMsg.textContent = err.message;
    errEl.style.display = 'flex';
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
