<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Revora</title>
  <meta name="description" content="Sign in to your Revora subscription management account.">
  <link rel="stylesheet" href="/css/app.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">R</div>
        <h1>Welcome Back</h1>
        <p>Sign in to your Revora account</p>
      </div>
      <div class="auth-error" id="login-error" style="display:none"></div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="you@company.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-bottom:20px">
          <a href="/forgot-password.html" style="font-size:13px;font-weight:500">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:12px"
          id="btn-login">Sign In →</button>
      </form>
      <div class="auth-divider"><span>or</span></div>
      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Create Account</a>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script>
    if (Auth.isLoggedIn()) location.href = '/dashboard.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('btn-login');

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await API.post('/auth/login', { email, password });
        if (res.accessToken && res.user) {
          Auth.setSession(res.accessToken, res.user);
          window.location.href = '/dashboard.html';
        } else {
          throw new Error(res.error || 'Login failed');
        }
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'flex';
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    });
  </script>
</body>

</html>
