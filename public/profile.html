<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — Revora</title>
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-header-card {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 32px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-radius: var(--radius-xl);
            margin-bottom: 24px;
            box-shadow: var(--shadow-lg);
        }

        .profile-large-avatar {
            width: 100px;
            height: 100px;
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 800;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        .profile-header-info h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
        }

        .profile-header-info p {
            margin: 4px 0 0;
            opacity: 0.9;
            font-size: 16px;
        }

        .profile-role-tag {
            display: inline-block;
            margin-top: 12px;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <aside id="sidebar" class="sidebar"></aside>
        <div class="main-content">
            <header class="topbar">
                <div class="topbar-title">My Profile</div>
                <div class="topbar-actions">
                    <div style="position:relative">
                        <button class="topbar-icon-btn" id="notif-bell-btn">🔔<span class="notif-badge" id="notif-count" style="display:none">0</span></button>
                        <div class="notif-dropdown" id="notif-dropdown">
                            <div class="notif-dropdown-header">
                                <h3>Notifications</h3>
                                <button class="btn btn-ghost btn-xs" onclick="NotifManager.markAllRead()">Mark all read</button>
                            </div>
                            <div class="notif-dropdown-body" id="notif-dropdown-body"></div>
                        </div>
                    </div>
                </div>
            </header>
            <main class="page-content">
                <div class="profile-container">
                    <div class="profile-header-card">
                        <div class="profile-large-avatar" id="p-avatar">?</div>
                        <div class="profile-header-info">
                            <h1 id="p-name-display">Loading...</h1>
                            <p id="p-email-display">...</p>
                            <div class="profile-role-tag" id="p-role-display">...</div>
                        </div>
                    </div>

                    <div class="card card-with-spark" style="padding: 32px;">
                        <h3 style="margin-top: 0; margin-bottom: 24px; font-weight: 800; color: var(--primary);">Personal Information</h3>
                        <form id="profile-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-input" id="f-name" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" class="form-input" id="f-email" readonly style="background: var(--bg); opacity: 0.7;">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Phone Number</label>
                                    <input type="tel" class="form-input" id="f-phone">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Company Name</label>
                                    <input type="text" class="form-input" id="f-company">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Billing Address</label>
                                <textarea class="form-input" id="f-address" rows="3" style="min-height: 80px;"></textarea>
                            </div>
                            <div style="margin-top: 24px; display: flex; justify-content: flex-end; gap: 12px;">
                                <button type="button" class="btn btn-outline" onclick="window.history.back()">Back</button>
                                <button type="submit" class="btn btn-primary" id="save-btn">Update Profile</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="/js/app.js"></script>
    <script>
        if (!requireAuth()) throw new Error('Unauthorized');
        
        const user = Auth.getUser();

        async function loadProfile() {
            try {
                const res = await API.get(`/users/${user.id}`);
                const data = res.data;

                document.getElementById('p-avatar').textContent = fmt.initials(data.name);
                document.getElementById('p-name-display').textContent = data.name;
                document.getElementById('p-email-display').textContent = data.email;
                document.getElementById('p-role-display').textContent = data.role;

                document.getElementById('f-name').value = data.name;
                document.getElementById('f-email').value = data.email;
                document.getElementById('f-phone').value = data.phone || '';
                document.getElementById('f-company').value = data.companyName || '';
                document.getElementById('f-address').value = data.billingAddress || '';

            } catch (err) {
                Toast.error('Failed to load profile: ' + err.message);
            }
        }

        document.getElementById('profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            const orgText = btn.textContent;
            
            try {
                btn.disabled = true;
                btn.textContent = 'Updating...';
                
                const payload = {
                    name: document.getElementById('f-name').value,
                    phone: document.getElementById('f-phone').value,
                    companyName: document.getElementById('f-company').value,
                    billingAddress: document.getElementById('f-address').value
                };

                await API.put(`/users/${user.id}`, payload);
                
                // Update local storage user if name changed
                const updatedUser = { ...user, name: payload.name };
                localStorage.setItem('user', JSON.stringify(updatedUser));
                
                Toast.success('Profile updated successfully!');
                loadProfile();
                buildSidebar(); // Refresh sidebar to show new name/initials
            } catch (err) {
                Toast.error(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = orgText;
            }
        };

        loadProfile();
    </script>
</body>

</html>
