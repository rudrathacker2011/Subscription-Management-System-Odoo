<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quotation Templates — Revora</title>
  <link rel="stylesheet" href="/css/app.css">
</head>

<body>
  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-title">Templates</div>
        <div class="topbar-actions"><button class="btn btn-primary" onclick="openModal()">+ New Template</button>
          <div style="position:relative;margin-left:8px"><button class="topbar-icon-btn" id="notif-bell-btn">🔔<span
                class="notif-badge" id="notif-count" style="display:none">0</span></button>
            <div class="notif-dropdown" id="notif-dropdown">
              <div class="notif-dropdown-header">
                <h3>Notifications</h3><button class="btn btn-ghost btn-xs" onclick="NotifManager.markAllRead()">Mark all
                  read</button>
              </div>
              <div class="notif-dropdown-body" id="notif-dropdown-body"></div>
            </div>
          </div>
        </div>
      </header>
      <main class="page-content">
        <div class="page-header">
          <h1 style="cursor: pointer;" onclick="window.location.reload()">Quotation Templates</h1>
          <p class="text-muted">Manage predefined subscription templates</p>
        </div>
        <div class="card card-with-spark">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Template Name</th>
                  <th>Plan</th>
                  <th>Validity (Days)</th>
                  <th>Line Items</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr>
                  <td colspan="6" class="table-empty">
                    <div class="loading-spinner" style="margin:0 auto"></div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-overlay" id="form-modal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">New Template</div><button class="modal-close"
          onclick="Modal.hide('form-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="data-form">
          <input type="hidden" id="item-id">
          <div class="form-row">
            <div class="form-group"><label class="form-label">Template Name <span
                  class="required">*</span></label><input type="text" class="form-input" id="f-name" required></div>
            <div class="form-group"><label class="form-label">Plan</label><select class="form-select"
                id="f-plan"></select></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Validity (Days) <span
                  class="required">*</span></label><input type="number" class="form-input" id="f-validity" value="30"
                required></div>
            <div class="form-group" style="display:flex;align-items:flex-end;padding-bottom:12px">
              <div class="form-check"><input type="checkbox" id="f-active" checked><label class="form-check-label">Is
                  Active</label></div>
            </div>
          </div>
          <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea"
              id="f-desc"></textarea></div>

          <div class="divider"></div>
          <div class="detail-section-title">Template Line Items</div>
          <div id="li-container"></div>
          <button type="button" class="btn btn-outline btn-sm mt-1" onclick="addLineItem()">+ Add Product</button>
        </form>
      </div>
      <div class="modal-footer"><button class="btn btn-outline"
          onclick="Modal.hide('form-modal')">Cancel</button><button class="btn btn-primary" onclick="submitForm()">Save
          Template</button></div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth(['ADMIN', 'INTERNAL'])) throw new Error('Unauthorized');
    let productsList = [], plansList = [];

    async function loadData() {
      try {
        const [res, prodRes, planRes] = await Promise.all([
          API.get('/quotation-templates'),
          API.get('/products'),
          API.get('/plans')
        ]);
        productsList = prodRes.data;
        plansList = planRes.data;
        document.getElementById('f-plan').innerHTML = '<option value="">No Plan</option>' + plansList.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

        const tbody = document.getElementById('table-body');
        if (!res.data.length) return tbody.innerHTML = `<tr><td colspan="6" class="table-empty"><p>No templates found</p></td></tr>`;
        tbody.innerHTML = res.data.map(item => `
            <tr>
                <td><div class="fw-semibold">${item.name}</div><div style="font-size:12px;color:var(--text-muted)">${item.description || ''}</div></td>
                <td>${item.plan?.name || '—'}</td>
                <td>${item.validityDays} Days</td>
                <td><span class="badge" style="background:var(--primary-light);color:var(--primary)">${item.lineItems.length} items</span></td>
                <td>${item.isActive ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>'}</td>
                <td><button class="btn btn-ghost btn-sm" onclick='editItem(${JSON.stringify(item).replace(/'/g, "&apos;")})'>Edit</button><button class="btn btn-ghost btn-sm text-danger" onclick="deleteItem('${item.id}')">Del</button></td>
            </tr>
        `).join('');
      } catch (err) { Toast.error(err.message); }
    }

    function getProductOptions(selectedId = '') {
      return productsList.map(p => `<option value="${p.id}" ${p.id === selectedId ? 'selected' : ''}>${p.name} - ${fmt.currency(p.salesPrice)}</option>`).join('');
    }

    function addLineItem(productId = '', qty = 1) {
      const div = document.createElement('div');
      div.className = 'form-row mt-1';
      div.innerHTML = `
        <div class="form-group mb-0" style="flex:2"><select class="form-select li-product">${getProductOptions(productId)}</select></div>
        <div class="form-group mb-0"><input type="number" class="form-input li-qty" value="${qty}" min="1"></div>
        <button type="button" class="btn btn-ghost text-danger" onclick="this.parentElement.remove()" style="padding:10px">✕</button>
    `;
      document.getElementById('li-container').appendChild(div);
    }

    function openModal() {
      document.getElementById('data-form').reset();
      document.getElementById('item-id').value = '';
      document.getElementById('f-active').checked = true;
      document.getElementById('li-container').innerHTML = '';
      addLineItem();
      document.getElementById('modal-title').textContent = 'New Template';
      Modal.show('form-modal');
    }

    function editItem(item) {
      document.getElementById('item-id').value = item.id;
      document.getElementById('f-name').value = item.name;
      document.getElementById('f-plan').value = item.planId || '';
      document.getElementById('f-validity').value = item.validityDays;
      document.getElementById('f-desc').value = item.description || '';
      document.getElementById('f-active').checked = item.isActive;

      document.getElementById('li-container').innerHTML = '';
      if (item.lineItems && item.lineItems.length) {
        item.lineItems.forEach(li => addLineItem(li.productId, li.defaultQuantity));
      } else {
        addLineItem();
      }
      document.getElementById('modal-title').textContent = 'Edit Template';
      Modal.show('form-modal');
    }

    async function submitForm() {
      try {
        const id = document.getElementById('item-id').value;
        const lineItems = Array.from(document.getElementById('li-container').children).map(row => ({
          productId: row.querySelector('.li-product').value,
          defaultQuantity: parseInt(row.querySelector('.li-qty').value)
        })).filter(li => li.productId && li.defaultQuantity > 0);

        if (!lineItems.length) return Toast.error('Add at least one product');

        const payload = {
          name: document.getElementById('f-name').value,
          planId: document.getElementById('f-plan').value || null,
          validityDays: parseInt(document.getElementById('f-validity').value),
          description: document.getElementById('f-desc').value,
          isActive: document.getElementById('f-active').checked,
          lineItems
        };
        if (id) await API.put(`/quotation-templates/${id}`, payload);
        else await API.post('/quotation-templates', payload);
        Toast.success('Saved!'); Modal.hide('form-modal'); loadData();
      } catch (e) { Toast.error(e.message); }
    }

    async function deleteItem(id) {
      if (await confirmDialog('Delete Template', 'Are you sure you want to delete this template?')) {
        try { await API.delete(`/quotation-templates/${id}`); Toast.success('Deleted!'); loadData(); } catch (e) { Toast.error(e.message); }
      }
    }

    loadData();
  </script>
</body>

</html>
