<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoices — Revora</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">Invoices</div>
      <div class="topbar-actions"><div style="position:relative"><button class="topbar-icon-btn" id="notif-bell-btn">🔔<span class="notif-badge" id="notif-count" style="display:none">0</span></button><div class="notif-dropdown" id="notif-dropdown"><div class="notif-dropdown-header"><h3>Notifications</h3><button class="btn btn-ghost btn-xs" onclick="NotifManager.markAllRead()">Mark all read</button></div><div class="notif-dropdown-body" id="notif-dropdown-body"></div></div></div></div>
    </header>
    <main class="page-content">
      <div class="page-header"><h1 id="page-title">All Invoices</h1><p class="text-muted">Track billing and payments</p></div>
      <div class="filter-bar">
        <select class="filter-select" id="filter-status" onchange="loadData()">
          <option value="">All Statuses</option>
          <option value="DRAFT">Draft</option>
          <option value="CONFIRMED">Confirmed (Unpaid)</option>
          <option value="PAID">Paid</option>
          <option value="CANCELLED">Cancelled</option>
        </select>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Invoice #</th><th id="th-customer">Customer</th><th>Date</th><th>Due Date</th><th>Total</th><th>Status</th></tr></thead>
            <tbody id="table-body"><tr><td colspan="6" class="table-empty"><div class="loading-spinner" style="margin:0 auto"></div></td></tr></tbody>
          </table>
        </div>
        <div id="pagination-container" style="padding: 16px;"></div>
      </div>
    </main>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
if (!requireAuth()) throw new Error('Unauthorized');
const user = Auth.getUser();

if (user.role === 'PORTAL') {
    document.getElementById('page-title').textContent = 'My Invoices';
    document.getElementById('th-customer').style.display = 'none';
}

async function loadData(page = 1) {
    try {
        const status = document.getElementById('filter-status').value;
        let url = `/invoices?page=${page}&limit=10`;
        if (status) url += `&status=${status}`;

        const res = await API.get(url);
        const tbody = document.getElementById('table-body');
        if (!res.data.length) {
            tbody.innerHTML = `<tr><td colspan="${user.role === 'PORTAL' ? 5 : 6}" class="table-empty"><div class="empty-icon">📄</div><p>No invoices found</p></td></tr>`;
            document.getElementById('pagination-container').innerHTML = '';
            return;
        }

        tbody.innerHTML = res.data.map(item => `
            <tr style="cursor:pointer" onclick="window.location.href='/invoices-detail.html?id=${item.id}'">
                <td style="font-weight:700;font-family:var(--font-mono)">${item.invoiceNumber}</td>
                ${user.role !== 'PORTAL' ? `<td><div style="font-weight:600">${item.customer?.name || '—'}</div><div style="font-size:12px;color:var(--text-muted)">${item.subscription?.subscriptionNumber || ''}</div></td>` : ''}
                <td>${fmt.date(item.invoiceDate)}</td>
                <td class="${new Date(item.dueDate) < new Date() && item.status !== 'PAID' ? 'text-danger fw-bold' : ''}">${fmt.date(item.dueDate)}</td>
                <td class="text-mono fw-bold text-primary">${fmt.currency(item.total)}</td>
                <td>${fmt.badge(item.status)}</td>
            </tr>
        `).join('');
        renderPagination(document.getElementById('pagination-container'), res.pagination, 'loadData');
    } catch (err) { Toast.error(err.message); }
}

UI.upgradeSelect('filter-status', () => loadData(1));
loadData();
</script>
</body>
</html>
