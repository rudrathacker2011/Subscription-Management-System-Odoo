<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscriptions — Revora</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">Subscriptions</div>
      <div class="topbar-actions">
        <a href="/catalog.html" class="btn btn-primary" id="btn-request-sub" style="display:none">+ Request Subscription</a>
        <div style="position:relative"><button class="topbar-icon-btn" id="notif-bell-btn">🔔<span class="notif-badge" id="notif-count" style="display:none">0</span></button><div class="notif-dropdown" id="notif-dropdown"><div class="notif-dropdown-header"><h3>Notifications</h3><button class="btn btn-ghost btn-xs" onclick="NotifManager.markAllRead()">Mark all read</button></div><div class="notif-dropdown-body" id="notif-dropdown-body"></div></div></div>
      </div>
    </header>
    <main class="page-content">
      <div class="page-header page-header-row">
        <div>
          <h1 id="page-title">All Subscriptions</h1>
          <p class="text-muted">Manage your subscription lifecycle</p>
        </div>
      </div>

      <div class="filter-bar">
        <select class="filter-select" id="filter-status" onchange="loadData()">
          <option value="">All Statuses</option>
          <option value="DRAFT">Draft</option>
          <option value="PENDING_ADMIN_APPROVAL">Pending Admin</option>
          <option value="PENDING_STAFF_APPROVAL">Pending Staff</option>
          <option value="ACTIVE">Active</option>
          <option value="PAUSED">Paused</option>
          <option value="CLOSED">Closed</option>
          <option value="REJECTED">Rejected</option>
        </select>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Sub Number</th>
                <th id="th-customer">Customer</th>
                <th>Plan</th>
                <th>Status</th>
                <th>Start Date</th>
                <th>Next Billing</th>
                <th>Total/Cycle</th>
              </tr>
            </thead>
            <tbody id="table-body">
              <tr><td colspan="7" class="table-empty"><div class="loading-spinner" style="margin:0 auto"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div id="pagination-container" style="padding: 16px;"></div>
      </div>
    </main>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
if (!requireAuth()) throw new Error('Unauthorized');
const user = Auth.getUser();

if (user.role === 'PORTAL') {
    document.getElementById('page-title').textContent = 'My Subscriptions';
    document.getElementById('th-customer').style.display = 'none';
    document.getElementById('btn-request-sub').style.display = 'inline-flex';
}

async function loadData(page = 1) {
    try {
        const status = document.getElementById('filter-status').value;
        let url = `/subscriptions?page=${page}&limit=10`;
        if (status) url += `&status=${status}`;

        const res = await API.get(url);
        
        const tbody = document.getElementById('table-body');
        if (!res.data.length) {
            tbody.innerHTML = `<tr><td colspan="${user.role === 'PORTAL' ? 6 : 7}" class="table-empty"><div class="empty-icon">🔄</div><p>No subscriptions found</p></td></tr>`;
            document.getElementById('pagination-container').innerHTML = '';
            return;
        }

        tbody.innerHTML = res.data.map(item => {
            const total = item.lineItems.reduce((sum, li) => sum + li.lineTotal, 0);
            return `
            <tr style="cursor:pointer" onclick="window.location.href='/subscriptions-detail.html?id=${item.id}'">
                <td style="font-weight:700;font-family:var(--font-mono)">${item.subscriptionNumber}</td>
                ${user.role !== 'PORTAL' ? `<td><div style="font-weight:600">${item.customer?.name || '—'}</div><div style="font-size:12px;color:var(--text-muted)">${item.customer?.email || ''}</div></td>` : ''}
                <td><div style="font-weight:600">${item.plan?.name || '—'}</div><div style="font-size:12px;color:var(--text-muted)">${item.plan?.billingPeriod || ''}</div></td>
                <td>${fmt.badge(item.isPaused ? 'PAUSED' : item.status)}</td>
                <td>${fmt.date(item.startDate)}</td>
                <td style="font-weight:500">${fmt.date(item.nextBillingDate)}</td>
                <td class="text-mono" style="font-weight:600;color:var(--primary)">${fmt.currency(total)}</td>
            </tr>`;
        }).join('');

        renderPagination(document.getElementById('pagination-container'), res.pagination, 'loadData');
    } catch (err) {
        Toast.error(err.message);
    }
}

UI.upgradeSelect('filter-status', () => loadData(1));
loadData();
</script>
</body>
</html>
