<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — SubsManager</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-layout">
<aside id="sidebar" class="sidebar"></aside>
<div class="main-content">
<header class="topbar"><div class="topbar-title">Products</div></header>
<main class="page-content">
<div class="page-header-row">
  <div class="page-header"><h1>Products</h1><p>Manage your service and goods catalog</p></div>
  <button class="btn btn-primary" onclick="openCreateModal()" id="create-btn" style="display:none">+ New Product</button>
</div>

<div class="card">
  <div class="card-body" style="padding-bottom:0">
    <div class="filter-bar">
      <div class="filter-search">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Search products..." oninput="debounceSearch(this.value)">
      </div>
      <select class="filter-select" id="type-filter" onchange="loadProducts()">
        <option value="">All Types</option>
        <option value="SERVICE">Service</option>
        <option value="GOOD">Good</option>
      </select>
      <select class="filter-select" id="active-filter" onchange="loadProducts()">
        <option value="">All Status</option>
        <option value="true">Active</option>
        <option value="false">Inactive</option>
      </select>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Product Name</th><th>Type</th><th>Sales Price</th><th>Cost Price</th><th>Variants</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="products-table"><tr><td colspan="7" class="table-empty"><div class="loading-spinner" style="margin:0 auto"></div></td></tr></tbody>
    </table>
  </div>
  <div id="pagination" style="padding:16px 22px"></div>
</div>
</main>
</div>
</div>

<!-- Create/Edit Modal -->
<div id="product-modal" class="modal-overlay">
<div class="modal modal-lg">
  <div class="modal-header"><div class="modal-title" id="modal-title">New Product</div><button class="modal-close">✕</button></div>
  <div class="modal-body">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Product Name <span class="required">*</span></label>
        <input type="text" id="p-name" class="form-input" placeholder="e.g., Cloud Hosting Pro">
      </div>
      <div class="form-group">
        <label class="form-label">Product Type <span class="required">*</span></label>
        <select id="p-type" class="form-select"><option value="SERVICE">Service</option><option value="GOOD">Good</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Sales Price (₹) <span class="required">*</span></label>
        <input type="number" id="p-sales-price" class="form-input" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Cost Price (₹)</label>
        <input type="number" id="p-cost-price" class="form-input" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="p-description" class="form-textarea" placeholder="Product description..."></textarea>
    </div>
    <div style="display:flex;gap:20px;margin-bottom:16px">
      <label class="form-check"><input type="checkbox" id="p-active" checked><span class="form-check-label">Is Active</span></label>
      <label class="form-check"><input type="checkbox" id="p-recurring" checked><span class="form-check-label">Supports Recurring</span></label>
    </div>

    <!-- Variants Section -->
    <div id="variants-section" style="display:none;margin-top:8px">
      <div class="divider"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-weight:700;font-size:14px">Product Variants</div>
        <button class="btn btn-outline btn-sm" onclick="addVariantRow()">+ Add Variant</button>
      </div>
      <div id="variants-list"></div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-outline" onclick="Modal.hide('product-modal')">Cancel</button>
    <button class="btn btn-primary" id="save-btn" onclick="saveProduct()">Save Product</button>
  </div>
</div>
</div>

<!-- Variants Modal -->
<div id="variants-modal" class="modal-overlay">
<div class="modal">
  <div class="modal-header"><div class="modal-title">Manage Variants</div><button class="modal-close">✕</button></div>
  <div class="modal-body">
    <div id="variants-edit-list"></div>
    <button class="btn btn-outline btn-sm mt-2" onclick="addVariantEditRow()">+ Add Variant</button>
  </div>
  <div class="modal-footer">
    <button class="btn btn-outline" onclick="Modal.hide('variants-modal')">Close</button>
    <button class="btn btn-primary" onclick="saveVariants()">Save Variants</button>
  </div>
</div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
if (!requireAuth(['ADMIN', 'INTERNAL'])) throw new Error();

let currentPage = 1, editId = null, searchTimeout, variantProductId = null;
const isAdmin = Auth.isAdmin();

document.addEventListener('DOMContentLoaded', () => {
  if (isAdmin || Auth.isInternal()) document.getElementById('create-btn').style.display = '';
  loadProducts();
});

function debounceSearch(v) { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { currentPage = 1; loadProducts(); }, 350); }

async function loadProducts(page = 1) {
  currentPage = page;
  const search = document.getElementById('search').value;
  const type = document.getElementById('type-filter').value;
  const isActive = document.getElementById('active-filter').value;
  const params = new URLSearchParams({ page, limit: 20, ...(search && { search }), ...(type && { type }), ...(isActive !== '' && { isActive }) });

  const tbody = document.getElementById('products-table');
  tbody.innerHTML = '<tr><td colspan="7" class="table-empty"><div class="loading-spinner" style="margin:0 auto"></div></td></tr>';

  try {
    const res = await API.get('/products?' + params);
    if (!res.data.length) { tbody.innerHTML = '<tr><td colspan="7" class="table-empty"><div class="empty-icon">📦</div><p>No products found</p></td></tr>'; return; }

    tbody.innerHTML = res.data.map(p => `
      <tr>
        <td><div style="font-weight:600">${p.name}</div><div style="font-size:12px;color:var(--text-muted)">${p.description ? p.description.substring(0,60)+'...' : ''}</div></td>
        <td><span class="tag">${p.productType}</span></td>
        <td class="text-mono fw-semibold">${fmt.currency(p.salesPrice)}</td>
        <td class="text-mono text-muted">${p.costPrice ? fmt.currency(p.costPrice) : '—'}</td>
        <td><button class="btn btn-ghost btn-xs" onclick="openVariants('${p.id}','${p.name.replace(/'/g,"\\'")}')">
          ${p.variants?.length || 0} variant${p.variants?.length !== 1 ? 's' : ''}</button></td>
        <td>${fmt.badge(p.isActive ? 'ACTIVE' : 'CLOSED')}</td>
        <td>
          <div style="display:flex;gap:6px">
            <button class="btn btn-outline btn-xs" onclick="openEdit('${p.id}')">Edit</button>
            ${isAdmin ? `<button class="btn btn-danger btn-xs" onclick="deleteProduct('${p.id}','${p.name.replace(/'/g,"\\'")}')">Delete</button>` : ''}
          </div>
        </td>
      </tr>`).join('');

    renderPagination(document.getElementById('pagination'), res.pagination, loadProducts);
  } catch (err) { Toast.error(err.message); }
}

function openCreateModal() { editId = null; document.getElementById('modal-title').textContent = 'New Product'; resetForm(); Modal.show('product-modal'); }
function resetForm() { ['p-name','p-description'].forEach(id => document.getElementById(id).value = ''); document.getElementById('p-sales-price').value = ''; document.getElementById('p-cost-price').value = ''; document.getElementById('p-type').value = 'SERVICE'; document.getElementById('p-active').checked = true; document.getElementById('p-recurring').checked = true; }

async function openEdit(id) {
  editId = id;
  document.getElementById('modal-title').textContent = 'Edit Product';
  try {
    const res = await API.get('/products/' + id);
    const p = res.data;
    document.getElementById('p-name').value = p.name;
    document.getElementById('p-type').value = p.productType;
    document.getElementById('p-sales-price').value = p.salesPrice;
    document.getElementById('p-cost-price').value = p.costPrice || '';
    document.getElementById('p-description').value = p.description || '';
    document.getElementById('p-active').checked = p.isActive;
    document.getElementById('p-recurring').checked = p.supportsRecurring;
    Modal.show('product-modal');
  } catch (err) { Toast.error(err.message); }
}

async function saveProduct() {
  const payload = { name: document.getElementById('p-name').value.trim(), productType: document.getElementById('p-type').value, salesPrice: parseFloat(document.getElementById('p-sales-price').value), costPrice: parseFloat(document.getElementById('p-cost-price').value) || null, description: document.getElementById('p-description').value.trim(), isActive: document.getElementById('p-active').checked, supportsRecurring: document.getElementById('p-recurring').checked };
  if (!payload.name || !payload.salesPrice) { Toast.warning('Product name and sales price are required.'); return; }
  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saving...'; btn.disabled = true;
  try {
    if (editId) { await API.put('/products/' + editId, payload); Toast.success('Product updated!'); }
    else { await API.post('/products', payload); Toast.success('Product created!'); }
    Modal.hide('product-modal'); loadProducts();
  } catch (err) { Toast.error(err.message); }
  finally { btn.textContent = 'Save Product'; btn.disabled = false; }
}

async function deleteProduct(id, name) {
  const ok = await confirmDialog('Delete Product', `Are you sure you want to deactivate "${name}"? It will be hidden from the catalog.`, 'Deactivate');
  if (!ok) return;
  try { await API.delete('/products/' + id); Toast.success('Product deactivated.'); loadProducts(); } catch (err) { Toast.error(err.message); }
}

async function openVariants(id, name) {
  variantProductId = id;
  document.querySelector('#variants-modal .modal-title').textContent = `Variants — ${name}`;
  try {
    const res = await API.get(`/products/${id}/variants`);
    renderVariantEditList(res.data);
    Modal.show('variants-modal');
  } catch (err) { Toast.error(err.message); }
}

function renderVariantEditList(variants) {
  const list = document.getElementById('variants-edit-list');
  list.innerHTML = variants.length ? variants.map((v,i) => `
    <div class="form-row" style="gap:8px;align-items:flex-end;margin-bottom:8px" data-variant-id="${v.id}">
      <div class="form-group" style="margin:0;flex:1"><input class="form-input" value="${v.attribute}" placeholder="Attribute (e.g. Size)"></div>
      <div class="form-group" style="margin:0;flex:1"><input class="form-input" value="${v.value}" placeholder="Value (e.g. Large)"></div>
      <div class="form-group" style="margin:0;width:120px"><input class="form-input" type="number" value="${v.extraPrice}" placeholder="Extra ₹" min="0"></div>
      <button class="btn btn-danger btn-xs" onclick="deleteVariant('${v.id}',this.closest('[data-variant-id]'))">✕</button>
    </div>`).join('') : '<p class="text-muted" style="font-size:13px">No variants yet. Add one below.</p>';
}

function addVariantEditRow() {
  const list = document.getElementById('variants-edit-list');
  const div = document.createElement('div');
  div.className = 'form-row'; div.style.cssText = 'gap:8px;align-items:flex-end;margin-bottom:8px'; div.dataset.variantId = 'new';
  div.innerHTML = `<div class="form-group" style="margin:0;flex:1"><input class="form-input" placeholder="Attribute (e.g. Size)"></div><div class="form-group" style="margin:0;flex:1"><input class="form-input" placeholder="Value (e.g. Large)"></div><div class="form-group" style="margin:0;width:120px"><input class="form-input" type="number" placeholder="Extra ₹" min="0"></div><button class="btn btn-danger btn-xs" onclick="this.closest('[data-variant-id]').remove()">✕</button>`;
  list.appendChild(div);
}

async function deleteVariant(id, row) {
  try { await API.delete(`/products/${variantProductId}/variants/${id}`); row.remove(); Toast.success('Variant deleted.'); } catch (err) { Toast.error(err.message); }
}

async function saveVariants() {
  const newRows = document.querySelectorAll('[data-variant-id="new"]');
  for (const row of newRows) {
    const inputs = row.querySelectorAll('input');
    const attribute = inputs[0].value.trim(), value = inputs[1].value.trim(), extraPrice = parseFloat(inputs[2].value) || 0;
    if (!attribute || !value) continue;
    try { await API.post(`/products/${variantProductId}/variants`, { attribute, value, extraPrice }); } catch (err) { Toast.error(err.message); }
  }
  Toast.success('Variants saved!'); Modal.hide('variants-modal'); loadProducts();
}
</script>
</body>
</html>
