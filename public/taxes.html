<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taxes — Revora</title>
  <link rel="stylesheet" href="/css/app.css">
</head>

<body>
  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-title">Taxes</div>
        <div class="topbar-actions"><button class="btn btn-primary" onclick="openModal()">+ New Tax</button>
          <div style="position:relative;margin-left:8px"><button class="topbar-icon-btn" id="notif-bell-btn">🔔<span
                class="notif-badge" id="notif-count" style="display:none">0</span></button>
            <div class="notif-dropdown" id="notif-dropdown">
              <div class="notif-dropdown-header">
                <h3>Notifications</h3><button class="btn btn-ghost btn-xs" onclick="NotifManager.markAllRead()">Mark all
                  read</button>
              </div>
              <div class="notif-dropdown-body" id="notif-dropdown-body"></div>
            </div>
          </div>
        </div>
      </header>
      <main class="page-content">
        <div class="page-header">
          <h1 style="cursor: pointer;" onclick="window.location.reload()">Tax Configurations</h1>
          <p class="text-muted">Manage GST, VAT, and custom tax rules</p>
        </div>
        <div class="card card-with-spark">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Tax Name</th>
                  <th>Type</th>
                  <th>Percentage</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr>
                  <td colspan="5" class="table-empty">
                    <div class="loading-spinner" style="margin:0 auto"></div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-overlay" id="form-modal">
    <div class="modal form-with-spark">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">New Tax</div><button class="modal-close"
          onclick="Modal.hide('form-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="data-form">
          <input type="hidden" id="item-id">
          <div class="form-group"><label class="form-label">Name <span class="required">*</span></label><input
              type="text" class="form-input" id="f-name" required placeholder="e.g. IGST 18%"></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Type <span class="required">*</span></label><select
                class="form-select" id="f-type">
                <option value="GST">GST</option>
                <option value="VAT">VAT</option>
                <option value="SALES_TAX">Sales Tax</option>
                <option value="CUSTOM">Custom</option>
              </select></div>
            <div class="form-group"><label class="form-label">Percentage (%) <span
                  class="required">*</span></label><input type="number" class="form-input" id="f-percent" step="0.01"
                required></div>
          </div>
          <div class="form-check mt-1"><input type="checkbox" id="f-active" checked><label class="form-check-label">Is
              Active</label></div>
        </form>
      </div>
      <div class="modal-footer"><button class="btn btn-outline"
          onclick="Modal.hide('form-modal')">Cancel</button><button class="btn btn-primary" onclick="submitForm()">Save
          Tax</button></div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth(['ADMIN', 'INTERNAL'])) throw new Error('Unauthorized');

    async function loadData() {
      try {
        const res = await API.get('/taxes');
        const tbody = document.getElementById('table-body');
        if (!res.data.length) return tbody.innerHTML = `<tr><td colspan="5" class="table-empty"><p>No taxes found</p></td></tr>`;
        tbody.innerHTML = res.data.map(item => `
            <tr>
                <td><div class="fw-semibold">${item.name}</div></td>
                <td><span class="badge" style="background:var(--primary-light);color:var(--primary)">${item.taxType}</span></td>
                <td class="mono fw-bold">${item.percentage}%</td>
                <td>${item.isActive ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>'}</td>
                <td><button class="btn btn-ghost btn-sm" onclick='editItem(${JSON.stringify(item).replace(/'/g, "&apos;")})'>Edit</button></td>
            </tr>
        `).join('');
      } catch (err) { Toast.error(err.message); }
    }

    function openModal() {
      document.getElementById('data-form').reset();
      document.getElementById('item-id').value = '';
      document.getElementById('f-active').checked = true;
      document.getElementById('modal-title').textContent = 'New Tax';
      Modal.show('form-modal');
    }

    function editItem(item) {
      document.getElementById('item-id').value = item.id;
      document.getElementById('f-name').value = item.name;
      document.getElementById('f-type').value = item.taxType;
      document.getElementById('f-percent').value = item.percentage;
      document.getElementById('f-active').checked = item.isActive;
      document.getElementById('modal-title').textContent = 'Edit Tax';
      Modal.show('form-modal');
    }

    async function submitForm() {
      try {
        const id = document.getElementById('item-id').value;
        const payload = {
          name: document.getElementById('f-name').value,
          taxType: document.getElementById('f-type').value,
          percentage: parseFloat(document.getElementById('f-percent').value),
          isActive: document.getElementById('f-active').checked
        };
        if (id) await API.put(`/taxes/${id}`, payload);
        else await API.post('/taxes', payload);
        Toast.success('Saved!'); Modal.hide('form-modal'); loadData();
      } catch (e) { Toast.error(e.message); }
    }
    loadData();
  </script>
</body>

</html>
