<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Revora</title>
  <link rel="stylesheet" href="/css/app.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">R</div>
        <h1>Create Account</h1>
        <p>Join Revora and manage your subscriptions</p>
      </div>
      <div class="auth-error" id="reg-error" style="display:none"></div>
      <form id="register-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="you@company.com" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="password" placeholder="••••••••" required minlength="6">
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" class="form-input" id="phone" placeholder="+91-9876543210">
          </div>
          <div class="form-group">
            <label class="form-label">Company</label>
            <input type="text" class="form-input" id="company" placeholder="Your Company">
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:12px"
          id="btn-register">Create Account →</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="/login.html">Sign In</a>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script>
    if (Auth.isLoggedIn()) location.href = '/dashboard.html';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const phone = document.getElementById('phone').value;
      const companyName = document.getElementById('company').value;
      const errEl = document.getElementById('reg-error');
      const btn = document.getElementById('btn-register');

      errEl.style.display = 'none';

      if (password !== confirmPassword) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'flex';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await API.post('/auth/register', { name, email, password, phone, companyName });
        if (res.accessToken && res.user) {
          Auth.setSession(res.accessToken, res.user);
          window.location.href = '/dashboard.html';
        } else {
          throw new Error(res.error || 'Registration failed');
        }
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'flex';
        btn.disabled = false;
        btn.textContent = 'Create Account →';
      }
    });
  </script>
</body>

</html>
