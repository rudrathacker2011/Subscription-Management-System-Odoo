<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Revora</title>
  <link rel="stylesheet" href="/css/app.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card form-with-spark">
      <div class="auth-logo" style="cursor: pointer;" onclick="window.location.reload()">
        <div class="auth-logo-icon">R</div>
        <h1>Reset Password</h1>
        <p>Enter your email and we'll send a reset link</p>
      </div>
      <div class="auth-error" id="error-msg" style="display:none"></div>
      <div id="success-msg"
        style="display:none;background:var(--success-light);border:1px solid #A7F3D0;border-radius:var(--radius);padding:12px 16px;font-size:13px;color:#065F46;margin-bottom:18px;text-align:center">
      </div>
      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="you@company.com" required>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:12px"
          id="btn-submit">Send Reset Link →</button>
      </form>
      <div class="auth-footer" style="margin-top:24px">
        <a href="/login.html">← Back to Sign In</a>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const errEl = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');
      const btn = document.getElementById('btn-submit');

      errEl.style.display = 'none';
      successEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (res.ok) {
          successEl.textContent = data.message || 'Password reset email sent. Check your inbox.';
          successEl.style.display = 'block';
          btn.textContent = 'Email Sent ✓';
        } else {
          throw new Error(data.error || 'Failed to send reset email');
        }
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'flex';
        btn.disabled = false;
        btn.textContent = 'Send Reset Link →';
      }
    });
  </script>
</body>

</html>
