<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Odoo Hub</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h2>Forgotten Credentials</h2>
        <p class="status-msg" style="margin-bottom: 1.5rem; font-size: 0.875rem; color: var(--text-secondary); line-height: 1.5;">
            Enter your email address and we will generate a secure reset link for your terminal profile.
        </p>
        <form id="forgot-form">
            <div class="form-group">
                <label for="email">Identity Email</label>
                <input type="email" id="email" placeholder="agent@odoo.io" required>
            </div>
            <button type="submit" id="btn-submit">Dispatch Reset Link</button>
            <p class="error" id="message"></p>
        </form>
        <p class="switch-link">Remembered your code? <a href="/index.html">Access Terminal</a></p>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const messageP = document.getElementById('message');
            const submitBtn = document.getElementById('btn-submit');
            
            messageP.style.color = 'var(--text-secondary)';
            messageP.textContent = 'Verifying identity...';
            submitBtn.disabled = true;

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();
                
                if (res.ok) {
                    messageP.style.color = '#10b981'; // Success Green
                    messageP.textContent = data.message;
                    submitBtn.textContent = 'Link Dispatched';
                } else {
                    messageP.style.color = 'var(--error-red)';
                    messageP.textContent = data.error || 'Identity verification failed.';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                messageP.style.color = 'var(--error-red)';
                messageP.textContent = 'Critical system error.';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
