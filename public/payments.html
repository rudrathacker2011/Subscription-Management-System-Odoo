<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments — SubsManager</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-layout">
<aside id="sidebar" class="sidebar"></aside>
<div class="main-content">
<header class="topbar"><div class="topbar-title">Payments</div></header>
<main class="page-content">
<div class="page-header-row">
  <div class="page-header"><h1>Payments</h1><p>Payment history and reconciliation</p></div>
  <button class="btn btn-primary" onclick="Modal.show('pay-modal')" id="new-pay-btn" style="display:none">+ Record Payment</button>
</div>

<div class="card">
  <div class="card-body" style="padding-bottom:0">
    <div class="filter-bar">
      <div class="filter-search">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Search payment number..." oninput="debounceSearch()">
      </div>
      <select class="filter-select" id="method-filter" onchange="loadPayments()">
        <option value="">All Methods</option>
        <option>CASH</option><option>CARD</option><option>BANK_TRANSFER</option><option>UPI</option><option>CHEQUE</option>
      </select>
      <input type="date" id="start-date" class="filter-select" onchange="loadPayments()">
      <input type="date" id="end-date" class="filter-select" onchange="loadPayments()">
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Payment #</th><th>Customer</th><th>Invoice</th><th>Method</th><th>Date</th><th>Amount</th><th>Reference</th></tr></thead>
      <tbody id="pay-table"><tr><td colspan="7" class="table-empty"><div class="loading-spinner" style="margin:0 auto"></div></td></tr></tbody>
    </table>
  </div>
  <div id="pagination" style="padding:16px 22px"></div>
</div>

</main>
</div>
</div>

<!-- Record Payment Modal -->
<div id="pay-modal" class="modal-overlay">
<div class="modal" style="max-width:500px">
  <div class="modal-header"><div class="modal-title">Record Payment</div><button class="modal-close">✕</button></div>
  <div class="modal-body">
    <div class="form-group"><label class="form-label">Invoice Number <span class="required">*</span></label>
      <input type="text" id="pay-inv-search" class="form-input" placeholder="Type invoice number to search..." oninput="searchInvoice(this.value)">
      <div id="inv-suggestions" style="border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);max-height:160px;overflow-y:auto;display:none"></div>
      <input type="hidden" id="pay-inv-id">
    </div>
    <div id="inv-summary" style="display:none;background:var(--surface-2);border-radius:var(--radius);padding:12px;margin-bottom:12px;font-size:13.5px">
      <div style="display:flex;justify-content:space-between"><span>Total:</span><span class="text-mono" id="inv-s-total"></span></div>
      <div style="display:flex;justify-content:space-between"><span>Paid:</span><span class="text-mono text-success" id="inv-s-paid"></span></div>
      <div style="display:flex;justify-content:space-between;font-weight:700;color:var(--danger)"><span>Due:</span><span class="text-mono" id="inv-s-due"></span></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Amount (₹) <span class="required">*</span></label><input type="number" id="pay-amount" class="form-input" placeholder="0.00" min="0.01" step="0.01"></div>
      <div class="form-group"><label class="form-label">Method <span class="required">*</span></label>
        <select id="pay-method" class="form-select"><option value="CASH">Cash</option><option value="CARD">Card</option><option value="BANK_TRANSFER">Bank Transfer</option><option value="UPI">UPI</option><option value="CHEQUE">Cheque</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Payment Date</label><input type="date" id="pay-date" class="form-input"></div>
      <div class="form-group"><label class="form-label">Reference / Txn ID</label><input type="text" id="pay-ref" class="form-input" placeholder="Optional"></div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea id="pay-notes" class="form-textarea" placeholder="Optional..."></textarea></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-outline" onclick="Modal.hide('pay-modal')">Cancel</button>
    <button class="btn btn-primary" onclick="savePayment()">Record Payment</button>
  </div>
</div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
if (!requireAuth()) throw new Error();
let currentPage = 1, searchTimeout;

document.addEventListener('DOMContentLoaded', () => {
  if (Auth.isInternal()) document.getElementById('new-pay-btn').style.display = '';
  document.getElementById('pay-date').value = new Date().toISOString().split('T')[0];
  loadPayments();
});

function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { currentPage=1; loadPayments(); }, 350); }

async function loadPayments(page = 1) {
  currentPage = page;
  const method = document.getElementById('method-filter').value;
  const startDate = document.getElementById('start-date').value;
  const endDate = document.getElementById('end-date').value;
  const params = new URLSearchParams({ page, limit: 20, ...(method && { method }), ...(startDate && { startDate }), ...(endDate && { endDate }) });

  const tbody = document.getElementById('pay-table');
  tbody.innerHTML = '<tr><td colspan="7" class="table-empty"><div class="loading-spinner" style="margin:0 auto"></div></td></tr>';

  try {
    const res = await API.get('/payments?' + params);
    if (!res.data.length) { tbody.innerHTML = '<tr><td colspan="7" class="table-empty"><div class="empty-icon">💳</div><p>No payments found</p></td></tr>'; return; }
    tbody.innerHTML = res.data.map(p => `
      <tr>
        <td class="text-mono fw-semibold">${p.paymentNumber}</td>
        <td><div style="font-weight:600">${p.customer?.name||'—'}</div><div style="font-size:12px;color:var(--text-muted)">${p.customer?.email||''}</div></td>
        <td><a href="/invoices-detail.html?id=${p.invoiceId}" class="text-mono">${p.invoice?.invoiceNumber||'—'}</a></td>
        <td><span class="tag">${p.paymentMethod}</span></td>
        <td style="font-size:13px">${fmt.date(p.paymentDate)}</td>
        <td class="text-mono fw-bold text-success">${fmt.currency(p.amount)}</td>
        <td style="font-size:12.5px;color:var(--text-muted)">${p.referenceNumber||'—'}</td>
      </tr>`).join('');
    renderPagination(document.getElementById('pagination'), res.pagination, loadPayments);
  } catch (err) { Toast.error(err.message); }
}

let invSearchTimeout;
async function searchInvoice(query) {
  clearTimeout(invSearchTimeout);
  const sugg = document.getElementById('inv-suggestions');
  document.getElementById('pay-inv-id').value = '';
  document.getElementById('inv-summary').style.display = 'none';
  if (!query || query.length < 3) { sugg.style.display = 'none'; return; }
  invSearchTimeout = setTimeout(async () => {
    try {
      const res = await API.get('/invoices?limit=10&status=CONFIRMED');
      const filtered = res.data.filter(i => i.invoiceNumber.toLowerCase().includes(query.toLowerCase()));
      sugg.style.display = filtered.length ? '' : 'none';
      sugg.innerHTML = filtered.map(i => `
        <div onclick="selectInvoice(${JSON.stringify(i).replace(/"/g,'&quot;')})" style="padding:10px 12px;cursor:pointer;font-size:13.5px;border-bottom:1px solid var(--border);transition:background 0.1s" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">
          <span class="text-mono fw-semibold">${i.invoiceNumber}</span> — ${i.customer?.name||'?'} — <span class="text-danger">${fmt.currency(i.amountDue)} due</span>
        </div>`).join('');
    } catch {}
  }, 300);
}

function selectInvoice(inv) {
  document.getElementById('pay-inv-search').value = inv.invoiceNumber;
  document.getElementById('pay-inv-id').value = inv.id;
  document.getElementById('inv-suggestions').style.display = 'none';
  document.getElementById('pay-amount').value = inv.amountDue.toFixed(2);
  document.getElementById('inv-s-total').textContent = fmt.currency(inv.total);
  document.getElementById('inv-s-paid').textContent = fmt.currency(inv.amountPaid);
  document.getElementById('inv-s-due').textContent = fmt.currency(inv.amountDue);
  document.getElementById('inv-summary').style.display = '';
}

async function savePayment() {
  const invoiceId = document.getElementById('pay-inv-id').value;
  const amount = parseFloat(document.getElementById('pay-amount').value);
  const paymentMethod = document.getElementById('pay-method').value;
  const paymentDate = document.getElementById('pay-date').value;
  const referenceNumber = document.getElementById('pay-ref').value.trim();
  const notes = document.getElementById('pay-notes').value.trim();
  if (!invoiceId) { Toast.warning('Please select an invoice.'); return; }
  if (!amount || amount <= 0) { Toast.warning('Enter a valid amount.'); return; }
  try {
    await API.post('/payments', { invoiceId, amount, paymentMethod, paymentDate, referenceNumber, notes });
    Toast.success('Payment recorded!');
    Modal.hide('pay-modal');
    ['pay-inv-search','pay-ref','pay-notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('pay-inv-id').value = '';
    document.getElementById('inv-summary').style.display = 'none';
    loadPayments();
  } catch (err) { Toast.error(err.message); }
}
</script>
</body>
</html>
