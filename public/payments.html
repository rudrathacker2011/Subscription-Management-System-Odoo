<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments — Revora</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">Payments</div>
      <div class="topbar-actions"><div style="position:relative"><button class="topbar-icon-btn" id="notif-bell-btn">🔔<span class="notif-badge" id="notif-count" style="display:none">0</span></button><div class="notif-dropdown" id="notif-dropdown"><div class="notif-dropdown-header"><h3>Notifications</h3><button class="btn btn-ghost btn-xs" onclick="NotifManager.markAllRead()">Mark all read</button></div><div class="notif-dropdown-body" id="notif-dropdown-body"></div></div></div></div>
    </header>
    <main class="page-content">
      <div class="page-header"><h1 id="page-title">Payment History</h1><p class="text-muted">Track all received payments</p></div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Payment ID</th><th id="th-customer">Customer</th><th>Invoice</th><th>Date</th><th>Method</th><th>Amount</th></tr></thead>
            <tbody id="table-body"><tr><td colspan="6" class="table-empty"><div class="loading-spinner" style="margin:0 auto"></div></td></tr></tbody>
          </table>
        </div>
        <div id="pagination-container" style="padding: 16px;"></div>
      </div>
    </main>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
if (!requireAuth()) throw new Error('Unauthorized');
const user = Auth.getUser();

if (user.role === 'PORTAL') {
    document.getElementById('page-title').textContent = 'My Payments';
    document.getElementById('th-customer').style.display = 'none';
}

async function loadData(page = 1) {
    try {
        const res = await API.get(`/payments?page=${page}&limit=10`);
        const tbody = document.getElementById('table-body');
        if (!res.data.length) {
            tbody.innerHTML = `<tr><td colspan="${user.role === 'PORTAL' ? 5 : 6}" class="table-empty"><div class="empty-icon">💳</div><p>No payments found</p></td></tr>`;
            document.getElementById('pagination-container').innerHTML = '';
            return;
        }

        tbody.innerHTML = res.data.map(item => `
            <tr>
                <td style="font-weight:700;font-family:var(--font-mono)">${item.paymentNumber}</td>
                ${user.role !== 'PORTAL' ? `<td><div style="font-weight:600">${item.customer?.name || '—'}</div></td>` : ''}
                <td><a href="/invoices-detail.html?id=${item.invoice?.id}" class="mono fw-semibold">${item.invoice?.invoiceNumber || '—'}</a></td>
                <td>${fmt.date(item.paymentDate)}</td>
                <td>${item.paymentMethod} ${item.referenceNumber ? `(${item.referenceNumber})` : ''}</td>
                <td class="text-mono fw-bold text-success">${fmt.currency(item.amount)}</td>
            </tr>
        `).join('');
        renderPagination(document.getElementById('pagination-container'), res.pagination, 'loadData');
    } catch (err) { Toast.error(err.message); }
}

loadData();
</script>
</body>
</html>
